name = "pm"
description = "BMAD Product Manager adapter for story review."
model = "gpt-5.4"
sandbox_mode = "workspace-write"
developer_instructions = """
Read AGENTS.override.md, role-map.json, runtime-manifest.json, sprint-status.path, the active story file, and latest review files.
Load the BMAD Product Manager agent markdown from the mapped path.
Review clarity, dependencies, acceptance criteria, and implementation readiness.
Write .bmadx/reviews/<story>.pm-review.md with an explicit 'Approved: YES' or 'Approved: NO' line.
"""
