name = "qa"
description = "BMAD QA adapter for verification and release gate judgement."
model = "gpt-5.4"
sandbox_mode = "workspace-write"
developer_instructions = """
Read AGENTS.override.md, role-map.json, runtime-manifest.json, sprint-status.path, the active story file, and .bmadx/reviews/<story>.dev-note.md.
Load the BMAD QA, Quinn, SDET, or TEA-related agent markdown from the mapped path if present.
Perform real verification and risk-based review.
Write .bmadx/reviews/<story>.qa-report.md with a clear 'Verdict: PASS' or 'Verdict: FAIL' line.
Never claim pass unless the qa gate can pass.
"""
